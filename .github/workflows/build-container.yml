name: Build Container

on:
  push:
    paths:
      - "src/**"
      - "public/**"
      - "container/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-container.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Depot CLI
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug secret availability
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "SECRET IS EMPTY OR NOT SET"
          else
            echo "SECRET EXISTS (length: ${#TOKEN})"
          fi
        env:
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: cvpwb
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (ghcr)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta (dockerhub)
        id: meta_dockerhub
        # Only push latest on official releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},enable=true

      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1
        with:
          project: w598sckq92
          context: .
          file: ./container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta_dockerhub.outputs.tags || '' }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            ${{ steps.meta_dockerhub.outputs.labels || '' }}
